<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PhotoStockX</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f2d 50%, #1a1a3e 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        .logo {
            font-size: 56px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-top: 5px;
        }

        .stats-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: #00d4ff;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: white;
            box-shadow: 0 4px 15px rgba(0,212,255,0.2);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-back {
            background: rgba(255,255,255,0.08);
            color: white;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .upload-area {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            border: 2px dashed rgba(255,255,255,0.2);
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: rgba(255,255,255,0.1);
            border-color: #00d4ff;
        }

        .plus-icon {
            font-size: 48px;
            font-weight: 300;
            color: rgba(255,255,255,0.6);
        }

        .counter {
            text-align: right;
            margin: 10px 0;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }

        .counter span {
            color: #00d4ff;
            font-weight: bold;
            font-size: 18px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
            max-height: 350px;
            overflow-y: auto;
            padding: 5px;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 26px;
            height: 26px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .remove-btn:hover {
            background: #ff4444;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: linear-gradient(135deg, #0f0f2d, #1a1a3e);
            border-radius: 28px;
            padding: 30px;
            text-align: center;
            max-width: 280px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .modal-icon {
            font-size: 56px;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .modal-text {
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .modal-btn {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 30px;
            padding: 12px 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            padding-top: 30px;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
        }

        .hidden {
            display: none;
        }

        @keyframes fly {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            50% { transform: translateY(-100px) rotate(10deg); opacity: 0.5; }
            100% { transform: translateY(-300px) rotate(20deg); opacity: 0; }
        }

        .flying {
            animation: fly 0.8s ease forwards;
            position: fixed;
            z-index: 2000;
            font-size: 40px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ГЛАВНАЯ СТРАНИЦА -->
        <div id="mainPage" class="page active">
            <div class="header">
                <div class="logo">📸</div>
                <h1>PhotoStockX</h1>
                <div class="subtitle">Глобальная экосистема для продажи фото</div>
            </div>

            <div class="stats-card">
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="authors">0</div>
                        <div class="stat-label">АВТОРОВ ONLINE</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="clients">0</div>
                        <div class="stat-label">КЛИЕНТОВ ONLINE</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalSold">0</div>
                        <div class="stat-label">ПРОДАНО ВСЕГО</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="todaySold">0</div>
                        <div class="stat-label">СЕГОДНЯ ПРОДАНО</div>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary" id="startSellingBtn">🚀 Начать продавать</button>
            <button class="btn btn-secondary" id="buyPhotoBtn">🛍️ Купить фото</button>

            <div class="footer">
                <div>🧠 Нейросеть оценивает ваши кадры</div>
                <div style="margin-top: 5px;">и находит покупателей за считанные секунды</div>
            </div>
        </div>

        <!-- СТРАНИЦА ЗАГРУЗКИ ФОТО -->
        <div id="uploadPage" class="page">
            <button class="btn btn-back" id="backBtn">← Назад</button>

            <div class="header">
                <div class="logo">📸</div>
                <h1>Загрузите фото</h1>
                <div class="subtitle">Выберите до 10 снимков из галереи</div>
            </div>

            <div class="upload-area" id="uploadArea">
                <div class="plus-icon">➕</div>
            </div>

            <div class="counter">
                Выбрано: <span id="selectedCount">0</span> / 10
            </div>

            <div class="gallery" id="gallery"></div>

            <button class="btn btn-primary" id="submitBtn">📨 Отправить на проверку</button>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <div class="modal-title" id="modalTitle">Успешно!</div>
            <div class="modal-text" id="modalText"></div>
            <button class="modal-btn" id="modalCloseBtn">Хорошо</button>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" multiple class="hidden">

    <script>
        // Telegram Mini App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.MainButton.hide();

        // ---------- ПЕРЕМЕННЫЕ ----------
        let selectedPhotos = [];
        const MAX_PHOTOS = 10;

        // Статистика (начальные значения)
        // АВТОРЫ: ~14000, КЛИЕНТЫ: ~1800, ПРОДАЖИ: ~1M
        let stats = {
            authors: 14244,      // ~14k
            clients: 1856,       // ~1.8k
            totalSold: 1042150,  // ~1M
            todaySold: 142       // сегодня
        };

        // ---------- ФУНКЦИИ СТАТИСТИКИ ----------
        function updateStatsDisplay() {
            document.getElementById('authors').innerText = stats.authors.toLocaleString();
            document.getElementById('clients').innerText = stats.clients.toLocaleString();
            document.getElementById('totalSold').innerText = stats.totalSold.toLocaleString();
            document.getElementById('todaySold').innerText = stats.todaySold.toLocaleString();
        }

        // Обновление статистики в реальном времени
        function startLiveStats() {
            // АВТОРЫ: меняются на 3-10 каждые 10 секунд
            setInterval(() => {
                let change = Math.floor(Math.random() * 8) + 3; // 3-10
                if (Math.random() > 0.5) {
                    stats.authors += change;
                } else {
                    stats.authors -= change;
                }
                // Не уходим ниже 12000
                if (stats.authors < 12000) stats.authors = 12000;
                updateStatsDisplay();
            }, 10000);

            // КЛИЕНТЫ: меняются на 3-10 каждые 10 секунд (диапазон 1500-2000)
            setInterval(() => {
                let change = Math.floor(Math.random() * 8) + 3; // 3-10
                if (Math.random() > 0.5) {
                    stats.clients += change;
                } else {
                    stats.clients -= change;
                }
                // Ограничиваем 1500-2000
                if (stats.clients < 1500) stats.clients = 1500;
                if (stats.clients > 2000) stats.clients = 2000;
                updateStatsDisplay();
            }, 10000);

            // ПРОДАЖИ: увеличиваются на 3-5 каждые 5 секунд
            setInterval(() => {
                let sales = Math.floor(Math.random() * 3) + 3; // 3-5
                stats.totalSold += sales;
                stats.todaySold += sales;
                updateStatsDisplay();
            }, 5000);
        }

        // Сброс todaySold в 12:00
        function checkMidnightReset() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            
            if (hours === 12 && minutes === 0) {
                stats.todaySold = 0;
                updateStatsDisplay();
            }
        }
        
        setInterval(checkMidnightReset, 60000); // Проверка каждую минуту

        // ---------- МОДАЛЬНОЕ ОКНО ----------
        function showModal(icon, title, text, autoClose = false) {
            document.getElementById('modalIcon').innerText = icon;
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            document.getElementById('modal').style.display = 'flex';
            
            if (autoClose) {
                setTimeout(() => {
                    document.getElementById('modal').style.display = 'none';
                }, 3000);
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // ---------- АНИМАЦИЯ УЛЕТАНИЯ ФОТО ----------
        function animateFly(element) {
            return new Promise((resolve) => {
                const rect = element.getBoundingClientRect();
                const flyDiv = document.createElement('div');
                flyDiv.className = 'flying';
                flyDiv.innerHTML = '📸';
                flyDiv.style.left = rect.left + 'px';
                flyDiv.style.top = rect.top + 'px';
                document.body.appendChild(flyDiv);
                
                setTimeout(() => {
                    flyDiv.remove();
                    resolve();
                }, 800);
            });
        }

        // ---------- ГАЛЕРЕЯ ----------
        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            selectedPhotos.forEach((photo, index) => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    <img src="${photo.data}" alt="photo">
                    <div class="remove-btn" data-index="${index}">✕</div>
                `;
                gallery.appendChild(div);
            });
            
            document.getElementById('selectedCount').innerText = selectedPhotos.length;
            
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.index);
                    selectedPhotos.splice(idx, 1);
                    renderGallery();
                });
            });
        }

        // Выбор файлов
        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            const remainingSlots = MAX_PHOTOS - selectedPhotos.length;
            const filesToAdd = files.slice(0, remainingSlots);
            
            filesToAdd.forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        selectedPhotos.push({
                            name: file.name,
                            data: e.target.result
                        });
                        renderGallery();
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            document.getElementById('fileInput').value = '';
            
            if (files.length > remainingSlots) {
                showModal('⚠️', 'Много фото', `Можно выбрать не более ${MAX_PHOTOS} фото.`, true);
            }
        }

        // Отправка фото "в воздух"
        async function submitPhotos() {
            if (selectedPhotos.length === 0) {
                showModal('⚠️', 'Нет фото', 'Нужно выбрать хотя бы одно фото!', true);
                return;
            }
            
            const count = selectedPhotos.length;
            
            // Анимация улетания всех фото
            const items = document.querySelectorAll('.gallery-item');
            for (let i = 0; i < items.length; i++) {
                await animateFly(items[i]);
            }
            
            // Очищаем массив и галерею
            selectedPhotos = [];
            renderGallery();
            
            // Показываем успех
            showModal('🚀', 'Фото улетели!', `Ваши ${count} фото отправлены на проверку нейросети.`, true);
            
            // Отправляем данные в бот
            tg.sendData(JSON.stringify({
                action: 'photos_submitted',
                count: count
            }));
        }

        // ---------- НАВИГАЦИЯ ----------
        document.getElementById('startSellingBtn').onclick = () => {
            document.getElementById('mainPage').classList.remove('active');
            document.getElementById('uploadPage').classList.add('active');
        };
        
        document.getElementById('buyPhotoBtn').onclick = () => {
            showModal('🛍️', 'Скоро!', 'Галерея появится в следующем обновлении!', true);
        };
        
        document.getElementById('backBtn').onclick = () => {
            document.getElementById('uploadPage').classList.remove('active');
            document.getElementById('mainPage').classList.add('active');
        };
        
        document.getElementById('uploadArea').onclick = () => {
            document.getElementById('fileInput').click();
        };
        
        document.getElementById('fileInput').onchange = handleFileSelect;
        document.getElementById('submitBtn').onclick = submitPhotos;
        document.getElementById('modalCloseBtn').onclick = closeModal;
        document.getElementById('modal').onclick = (e) => {
            if (e.target === document.getElementById('modal')) closeModal();
        };
        
        // ---------- ЗАПУСК ----------
        updateStatsDisplay();
        startLiveStats();
        
        console.log('PhotoStockX Mini App загружен');
    </script>
</body>
</html>
