<!DOCTYPE html>
<html>
<head>
    <title>PhotoStockX</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            color: white;
            text-align: center;
            padding: 50px 20px;
        }
        h1 { font-size: 48px; }
        .stats { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin: 30px auto; max-width: 400px; }
        .stat { font-size: 32px; font-weight: bold; color: #00d4ff; }
        button {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div style="font-size: 64px;">📸</div>
    <h1>PhotoStockX</h1>
    <p>Глобальная экосистема для продажи фото</p>
    <div class="stats">
        <div class="stat" id="authors">12579</div>
        <div>АВТОРОВ ONLINE</div>
        <div class="stat" id="clients">18456</div>
        <div>КЛИЕНТОВ ONLINE</div>
        <div class="stat" id="total">1042150</div>
        <div>ПРОДАНО ВСЕГО</div>
        <div class="stat" id="today">14244</div>
        <div>СЕГОДНЯ ПРОДАНО</div>
    </div>
    <button id="sellBtn">🚀 Начать продавать</button>
    <button id="buyBtn">🛍️ Купить фото</button>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        let authors = 12579, clients = 18456, total = 1042150, today = 14244;
        function update() {
            document.getElementById('authors').innerText = authors;
            document.getElementById('clients').innerText = clients;
            document.getElementById('total').innerText = total;
            document.getElementById('today').innerText = today;
        }
        setInterval(() => {
            authors += Math.floor(Math.random() * 10) - 3;
            clients += Math.floor(Math.random() * 15) - 5;
            if (authors < 8000) authors = 8000;
            if (clients < 12000) clients = 12000;
            if (Math.random() < 0.2) {
                let s = Math.floor(Math.random() * 5) + 1;
                total += s;
                today += s;
            }
            update();
        }, 5000);
        document.getElementById('sellBtn').onclick = () => tg.showAlert('Скоро здесь будет загрузка фото!');
        document.getElementById('buyBtn').onclick = () => tg.showAlert('Галерея появится в следующем обновлении!');
    </script>
</body>
</html>
