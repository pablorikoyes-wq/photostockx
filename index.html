<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ФОТОСТОК</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f2d 50%, #1a1a3e 100%);
            min-height: 100vh;
            color: white;
            padding: 16px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Страницы */
        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 10px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .close-btn {
            background: rgba(255,255,255,0.1);
            width: 32px;
            height: 32px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }

        .fotostok-title {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
        }

        .logo {
            font-size: 40px;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Экран загрузки */
        .upload-title {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .upload-subtitle {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 24px;
        }

        /* Квадратная область загрузки (плюсик) */
        .upload-area {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            border: 2px dashed rgba(255,255,255,0.2);
            transition: all 0.2s;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .upload-area:hover {
            background: rgba(255,255,255,0.08);
            border-color: #00d4ff;
        }

        /* Контейнер для сетки фотографий */
        .photos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .photo-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-photo {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 24px;
            height: 24px;
            background: rgba(0,0,0,0.7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .remove-photo:hover {
            background: #ff4444;
        }

        .plus-placeholder {
            aspect-ratio: 1;
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 32px;
            color: rgba(255,255,255,0.5);
            transition: all 0.2s;
        }

        .plus-placeholder:hover {
            background: rgba(255,255,255,0.1);
            border-color: #00d4ff;
        }

        .counter {
            text-align: right;
            font-size: 13px;
            margin: 12px 0 12px 0;
            color: rgba(255,255,255,0.6);
        }

        .counter span {
            color: #00d4ff;
            font-weight: bold;
            font-size: 16px;
        }

        /* Кнопки */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }

        .btn-submit:active {
            transform: scale(0.97);
        }

        .btn-back {
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 12px;
            border-radius: 14px;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
        }

        .btn-back:active {
            transform: scale(0.97);
        }

        /* Статистика на главной */
        .stats-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 800;
            color: #00d4ff;
        }

        .stat-label {
            font-size: 9px;
            color: rgba(255,255,255,0.5);
            margin-top: 3px;
            text-transform: uppercase;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .btn-disabled {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            cursor: not-allowed;
        }

        .footer {
            text-align: center;
            padding-top: 20px;
            font-size: 9px;
            color: rgba(255,255,255,0.2);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ГЛАВНАЯ СТРАНИЦА -->
        <div id="mainPage" class="page active">
            <div class="header">
                <div class="header-top">
                    <div></div>
                    <div class="fotostok-title">ФОТОСТОК</div>
                    <div class="close-btn" id="closeBtn">✕</div>
                </div>
                <div class="logo">P</div>
                <h1>PhotoStockX</h1>
            </div>

            <div class="stats-card">
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="authors">12 434</div>
                        <div class="stat-label">АВТОРОВ ONLINE</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="clients">18 362</div>
                        <div class="stat-label">КЛИЕНТОВ ONLINE</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalSold">1 042 150</div>
                        <div class="stat-label">ПРОДАНО ВСЕГО</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="todaySold">14 249</div>
                        <div class="stat-label">СЕГОДНЯ ПРОДАНО</div>
                    </div>
                </div>
            </div>

            <button class="btn-disabled" disabled>Купить фото (только для авторов)</button>
            <button class="btn-primary" id="startSellBtn">Начать продавать</button>

            <div class="footer">🧠 Нейросеть оценивает ваши кадры</div>
        </div>

        <!-- СТРАНИЦА ЗАГРУЗКИ ФОТО -->
        <div id="uploadPage" class="page">
            <div class="header">
                <div class="header-top">
                    <div></div>
                    <div class="fotostok-title">ФОТОСТОК</div>
                    <div class="close-btn" id="closeBtnUpload">✕</div>
                </div>
            </div>

            <div class="upload-title">Загрузите фото</div>
            <div class="upload-subtitle">Выберите до 10 снимков из галереи</div>

            <!-- Сетка для фото и плюсика -->
            <div id="photosContainer" class="photos-grid"></div>

            <div class="counter">Выбрано: <span id="selectedCount">0</span> / 10</div>

            <button class="btn-submit" id="submitBtn">Отправить на проверку</button>
            <button class="btn-back" id="backToMainBtn">← Назад</button>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" multiple class="hidden">

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let selectedPhotos = [];
        const MAX_PHOTOS = 10;

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function renderPhotosGrid() {
            const container = document.getElementById('photosContainer');
            container.innerHTML = '';
            
            // Добавляем уже выбранные фото
            selectedPhotos.forEach((photo, idx) => {
                const div = document.createElement('div');
                div.className = 'photo-item';
                div.innerHTML = `
                    <img src="${photo.data}">
                    <div class="remove-photo" data-idx="${idx}">✕</div>
                `;
                container.appendChild(div);
            });
            
            // Если есть место для нового фото - показываем плюсик
            if (selectedPhotos.length < MAX_PHOTOS) {
                const plusDiv = document.createElement('div');
                plusDiv.className = 'plus-placeholder';
                plusDiv.innerHTML = '➕';
                plusDiv.onclick = () => document.getElementById('fileInput').click();
                container.appendChild(plusDiv);
            }
            
            // Заполняем пустые ячейки (чтобы сетка не прыгала)
            const totalCells = Math.min(MAX_PHOTOS, Math.max(3, Math.ceil(selectedPhotos.length / 3) * 3));
            const currentCount = container.children.length;
            for (let i = currentCount; i < 3 && i < MAX_PHOTOS - selectedPhotos.length + 1; i++) {
                // Не добавляем пустые ячейки, только если есть место и фото не выбраны
            }
            
            document.getElementById('selectedCount').innerText = selectedPhotos.length;
            
            // Обработчики удаления
            document.querySelectorAll('.remove-photo').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.idx);
                    selectedPhotos.splice(idx, 1);
                    renderPhotosGrid();
                };
            });
        }

        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            const remainingSlots = MAX_PHOTOS - selectedPhotos.length;
            const filesToAdd = files.slice(0, remainingSlots);
            
            filesToAdd.forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        selectedPhotos.push({ data: e.target.result });
                        renderPhotosGrid();
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            document.getElementById('fileInput').value = '';
            
            if (files.length > remainingSlots) {
                tg.showPopup({
                    title: 'Много фото',
                    message: `Можно выбрать не более ${MAX_PHOTOS} фото`,
                    buttons: [{type: 'ok'}]
                });
            }
        }

        // Обработчики
        document.getElementById('closeBtn').onclick = () => tg.close();
        document.getElementById('closeBtnUpload').onclick = () => tg.close();
        
        document.getElementById('startSellBtn').onclick = () => {
            showPage('uploadPage');
            renderPhotosGrid();
        };
        
        document.getElementById('backToMainBtn').onclick = () => showPage('mainPage');
        
        document.getElementById('fileInput').onchange = handleFileSelect;
        
        document.getElementById('submitBtn').onclick = () => {
            if (selectedPhotos.length === 0) {
                tg.showPopup({
                    title: 'Нет фото',
                    message: 'Выберите хотя бы одно фото для отправки',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            tg.showPopup({
                title: 'Отправлено',
                message: `Отправлено ${selectedPhotos.length} фото на проверку`,
                buttons: [{type: 'ok'}]
            });
        };

        // Живая статистика
        let authors = 12434;
        let clients = 18362;
        let totalSold = 1042150;
        let todaySold = 14249;

        function updateStats() {
            document.getElementById('authors').innerText = authors.toLocaleString();
            document.getElementById('clients').innerText = clients.toLocaleString();
            document.getElementById('totalSold').innerText = totalSold.toLocaleString();
            document.getElementById('todaySold').innerText = todaySold.toLocaleString();
        }

        setInterval(() => {
            authors += Math.floor(Math.random() * 15) - 5;
            clients += Math.floor(Math.random() * 20) - 7;
            if (authors < 12000) authors = 12000;
            if (clients < 18000) clients = 18000;
            updateStats();
        }, 8000);

        setInterval(() => {
            const sales = Math.floor(Math.random() * 4) + 1;
            totalSold += sales;
            todaySold += sales;
            updateStats();
        }, 5000);

        updateStats();
    </script>
</body>
</html>
